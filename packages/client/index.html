<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Firelance</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0d100d;
        font-family: ui-monospace, Consolas, monospace;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #overlay {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #f4ead8;
        background: rgba(0, 0, 0, 0.65);
        padding: 8px 10px;
        font-size: 12px;
        line-height: 1.5;
        border-radius: 6px;
        white-space: pre;
        display: none;
        pointer-events: none;
        z-index: 10;
      }
      #banner {
        position: fixed;
        top: 40%;
        left: 0;
        right: 0;
        text-align: center;
        color: #f05a4d;
        font-size: 28px;
        font-weight: bold;
        text-shadow: 0 2px 8px #000;
        display: none;
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="overlay"></div>
    <div id="banner"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
